<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portfolio | GitHub Style</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --gh-bg: #0d1117;
            --gh-border: #30363d;
            --gh-card: #161b22;
            --gh-text: #c9d1d9;
            --gh-link: #58a6ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--gh-bg);
            color: var(--gh-text);
            overflow-x: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }

        .glass-header {
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--gh-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .project-card {
            background: var(--gh-card);
            border: 1px solid var(--gh-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: #8b949e;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .project-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .project-card:hover::after {
            left: 100%;
        }

        .avatar-glow {
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
            border: 2px solid var(--gh-link);
        }

        .tag {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            border: 1px solid var(--gh-border);
            background: rgba(48, 54, 61, 0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--gh-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gh-border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <header class="glass-header py-4 px-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <svg height="32" viewBox="0 0 16 16" width="32" fill="white">
                    <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
                </svg>
                <span class="font-semibold text-lg">GitHub Portfolio</span>
            </div>
            <nav class="hidden md:flex space-x-6 text-sm font-medium">
                <a href="#" class="hover:text-white transition">Overview</a>
                <a href="#" class="text-white border-b-2 border-orange-500 pb-1">Repositories</a>
                <a href="#" class="hover:text-white transition">Projects</a>
                <a href="#" class="hover:text-white transition">Packages</a>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12 flex flex-col md:flex-row gap-8">
        <!-- Profile Sidebar -->
        <aside class="w-full md:w-1/4">
            <div class="relative group">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar" class="w-full rounded-full avatar-glow mb-6 bg-slate-800">
                <div class="absolute bottom-10 right-4 bg-gray-900 border border-gray-700 p-2 rounded-full hidden group-hover:block">
                    🚀 Working on something cool
                </div>
            </div>
            <h1 class="text-2xl font-bold text-white mb-1">Felix Dev</h1>
            <p class="text-xl text-gray-400 mb-4">Fullstack Sorcerer</p>
            <button class="w-full bg-[#21262d] border border-gray-700 hover:bg-[#30363d] text-white py-2 rounded-md font-medium mb-6 transition">
                Follow
            </button>
            <div class="space-y-3 text-sm text-gray-300">
                <div class="flex items-center">
                    <svg class="mr-2" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M2 5.5a3.5 3.5 0 1 1 5.898 2.549 5.508 5.508 0 0 1 3.034 4.084.75.75 0 1 1-1.482.235 4 4 0 0 0-7.9 0 .75.75 0 0 1-1.482-.236 5.507 5.507 0 0 1 3.102-4.083A3.477 3.477 0 0 1 2 5.5ZM5.5 5a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"></path></svg>
                    <span>2.4k followers · 182 following</span>
                </div>
                <div class="flex items-center">
                    <svg class="mr-2" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M1.75 2h12.5c.966 0 1.75.784 1.75 1.75v9.5A1.75 1.75 0 0 1 14.25 15H1.75A1.75 1.75 0 0 1 0 13.25v-9.5C0 2.784.784 2 1.75 2ZM1.5 3.75v.728l6.5 3.31 6.5-3.31v-.728a.25.25 0 0 0-.25-.25H1.75a.25.25 0 0 0-.25.25Z"></path></svg>
                    <a href="mailto:hello@felix.dev" class="hover:text-blue-400">hello@felix.dev</a>
                </div>
            </div>
        </aside>

        <!-- Projects Grid -->
        <section class="w-full md:w-3/4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold text-white">Popular Repositories</h2>
                <span class="text-xs text-gray-500 uppercase tracking-widest">Showing 6 of 42</span>
            </div>
            
            <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Projects will be injected here -->
            </div>

            <div class="mt-12">
                <h2 class="text-xl font-semibold text-white mb-6">Contribution Activity</h2>
                <div class="bg-gray-900/50 border border-gray-800 rounded-lg p-6 flex flex-wrap gap-1 justify-center">
                    <!-- GitHub contribution dots simulation -->
                    <script>
                        for(let i=0; i<150; i++) {
                            const opacity = [0.1, 0.3, 0.6, 0.9][Math.floor(Math.random() * 4)];
                            document.write(`<div style="width: 12px; height: 12px; border-radius: 2px; background: rgba(57, 211, 83, ${opacity});"></div>`);
                        }
                    </script>
                </div>
            </div>
        </section>
    </main>

    <footer class="max-w-6xl mx-auto px-6 py-12 border-t border-gray-800 text-sm text-gray-500 flex justify-between">
        <div>© 2024 Felix Dev. Built with Three.js</div>
        <div class="flex space-x-4">
            <a href="#" class="hover:text-blue-400">Terms</a>
            <a href="#" class="hover:text-blue-400">Privacy</a>
            <a href="#" class="hover:text-blue-400">Status</a>
        </div>
    </footer>

    <script>
        // --- DATA ---
        const projects = [
            {
                name: "quantum-engine",
                desc: "A high-performance physics engine written in Rust and WebAssembly.",
                lang: "Rust",
                color: "#dea584",
                stars: "1.2k",
                link: "https://github.com"
            },
            {
                name: "neural-style-transfer",
                desc: "Real-time video style transfer using TensorFlow.js and custom shaders.",
                lang: "JavaScript",
                color: "#f1e05a",
                stars: "842",
                link: "https://github.com"
            },
            {
                name: "nebula-ui",
                desc: "A neo-brutalist component library for modern React applications.",
                lang: "TypeScript",
                color: "#3178c6",
                stars: "2.5k",
                link: "https://github.com"
            },
            {
                name: "distributed-db",
                desc: "Lightweight key-value store with Raft consensus algorithm implementation.",
                lang: "Go",
                color: "#00add8",
                stars: "430",
                link: "https://github.com"
            },
            {
                name: "portfolio-3d",
                desc: "The source code for this very page, featuring Three.js particles.",
                lang: "HTML",
                color: "#e34c26",
                stars: "156",
                link: "https://github.com"
            },
            {
                name: "auto-scaler",
                desc: "Kubernetes operator for dynamic resource allocation based on ML predictions.",
                lang: "Python",
                color: "#3572A5",
                stars: "912",
                link: "https://github.com"
            }
        ];

        // --- RENDER PROJECTS ---
        const container = document.getElementById('projects-container');
        projects.forEach(p => {
            const card = document.createElement('div');
            card.className = 'project-card p-4 rounded-lg flex flex-col justify-between';
            card.onclick = () => window.open(p.link, '_blank');
            card.innerHTML = `
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-blue-400 font-semibold hover:underline flex items-center">
                            <svg class="mr-2" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7c.001.001.003.003.005.005l.647.646a.75.75 0 0 1-1.06 1.06l-.647-.646A2.5 2.5 0 0 1 2 13.5Zm11.25 8.5v-8h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8.75ZM4.5 1.5a1 1 0 0 0-1 1V8.5h8.25v-7h-7.25Z"></path></svg>
                            ${p.name}
                        </span>
                        <span class="tag text-gray-400 border-gray-700">Public</span>
                    </div>
                    <p class="text-sm text-gray-400 mb-4 line-clamp-2">${p.desc}</p>
                </div>
                <div class="flex items-center space-x-4 text-xs text-gray-400">
                    <div class="flex items-center">
                        <span class="w-3 h-3 rounded-full mr-1" style="background-color: ${p.color}"></span>
                        <span>${p.lang}</span>
                    </div>
                    <div class="flex items-center">
                        <svg class="mr-1" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path></svg>
                        <span>${p.stars}</span>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });

        // --- THREE.JS BACKGROUND ---
        let scene, camera, renderer, particles;
        let mouseX = 0, mouseY = 0;

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Particles
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 5000; i++) {
                vertices.push(
                    THREE.MathUtils.randFloatSpread(20),
                    THREE.MathUtils.randFloatSpread(20),
                    THREE.MathUtils.randFloatSpread(20)
                );
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));

            const material = new THREE.PointsMaterial({
                color: 0x58a6ff,
                size: 0.02,
                transparent: true,
                opacity: 0.5
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Subtle Geometry in distance
            const torusGeo = new THREE.TorusGeometry(3, 0.8, 16, 100);
            const torusMat = new THREE.MeshBasicMaterial({ 
                color: 0x58a6ff, 
                wireframe: true, 
                transparent: true, 
                opacity: 0.05 
            });
            const torus = new THREE.Mesh(torusGeo, torusMat);
            scene.add(torus);
            window.torus = torus;

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', onMouseMove);
        }

        function onMouseMove(event) {
            mouseX = (event.clientX - window.innerWidth / 2) / 100;
            mouseY = (event.clientY - window.innerHeight / 2) / 100;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            particles.rotation.x += 0.0005;
            particles.rotation.y += 0.0005;

            // Follow mouse movement
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            if(window.torus) {
                window.torus.rotation.x += 0.001;
                window.torus.rotation.y += 0.002;
            }

            renderer.render(scene, camera);
        }

        window.onload = () => {
            initThree();
            animate();
        };
    </script>
</body>
</html>
